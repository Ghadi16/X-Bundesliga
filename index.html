<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bundesliga – Spieltage &amp; Tabelle</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E8001D;
  --red2: #b0001a;
  --blue: #0066cc;
  --blue2: #004a99;
  --bg: #0b0b0e;
  --s1: #131318;
  --s2: #1c1c23;
  --s3: #252530;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0eff4;
  --muted: #7a798a;
  --muted2: #555466;
  --green: #1db954;
  --yellow: #f7c948;
  --cl: #00b4d8;   /* Champions League */
  --el: #ffb703;   /* Europa League */
  --rel: #d62828;  /* Relegation / Abstieg */
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
}

/* ── Header ── */
header {
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  padding: 1.1rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
  flex-wrap: wrap;
  gap: 10px;
}
.logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 1.6rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-mark {
  width: 40px;
  height: 40px;
  flex-shrink: 0;
}
.logo span { color: var(--blue); }
.season-sel { display: flex; align-items: center; gap: 8px; }
.season-sel label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
}
.season-sel select {
  background: var(--s2);
  color: var(--text);
  border: 1px solid var(--border2);
  padding: 6px 10px;
  font-family: 'Barlow', sans-serif;
  font-size: 0.9rem;
  border-radius: 4px;
}

/* ── Tabs ── */
.tabs {
  display: flex;
  gap: 0;
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 64px;
  z-index: 9;
}
.tab-btn {
  background: transparent;
  color: var(--muted);
  border: none;
  padding: 14px 26px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  cursor: pointer;
  position: relative;
  transition: color 0.15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--text); }
.tab-btn.active::after {
  content: "";
  position: absolute;
  bottom: -1px; left: 0; right: 0;
  height: 3px;
  background: var(--blue);
}

main { max-width: 980px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

/* ── Matchday buttons ── */
.matchdays {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
  gap: 6px;
  margin-bottom: 1.5rem;
}
.md-btn {
  background: var(--s2);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 10px 0;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.15s;
  border-radius: 3px;
}
.md-btn:hover { background: var(--s3); border-color: var(--border2); }
.md-btn.active {
  background: var(--blue);
  color: white;
  border-color: var(--blue);
}

.section-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 1.4rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.8rem;
  display: flex;
  align-items: baseline;
  gap: 12px;
  flex-wrap: wrap;
}
.section-title .sub {
  font-size: 0.85rem;
  color: var(--muted);
  font-weight: 600;
  letter-spacing: 0.1em;
}

/* ── Match list ── */
.match-list { display: flex; flex-direction: column; gap: 8px; }
.match {
  background: var(--s1);
  border: 1px solid var(--border);
  display: grid;
  grid-template-columns: 70px 1fr auto 1fr;
  align-items: center;
  padding: 14px 16px;
  gap: 12px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}
.match:hover {
  background: var(--s2);
  border-color: var(--border2);
  transform: translateX(2px);
}
.match.live { border-left: 3px solid var(--yellow); }
.date-block {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.78rem;
  color: var(--muted);
  font-weight: 600;
  letter-spacing: 0.04em;
  line-height: 1.2;
}
.date-block .time { color: var(--text); font-size: 0.9rem; font-weight: 700; }
.team { display: flex; align-items: center; gap: 10px; min-width: 0; }
.team.home { justify-content: flex-end; text-align: right; }
.team.away { justify-content: flex-start; text-align: left; }
.team-name {
  font-weight: 600;
  font-size: 0.95rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.team-logo { width: 28px; height: 28px; object-fit: contain; flex-shrink: 0; }
.team-logo-fallback {
  width: 28px; height: 28px;
  background: var(--s3);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 700; flex-shrink: 0;
}
.score {
  font-family: 'Barlow', sans-serif;
  font-weight: 600;
  font-size: 1.3rem;
  padding: 4px 14px;
  background: transparent;
  border-radius: 3px;
  color: #ffffff;
  letter-spacing: 0.05em;
  position: relative;
  min-width: 70px;
  text-align: center;
}
.score.upcoming {
  font-family: 'Barlow', sans-serif;
  font-size: 0.95rem;
  background: transparent;
  border: none;
  color: var(--muted);
  font-weight: 500;
}
.live-tag, .fin-tag {
  position: absolute;
  top: -8px; right: -6px;
  background: var(--yellow);
  color: #1a1a1a;
  font-size: 0.6rem;
  padding: 1px 5px;
  border-radius: 2px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  letter-spacing: 0.08em;
}
.fin-tag { background: var(--green); color: white; }

.loading, .error {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--muted);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.05em;
}
.error { color: var(--red); }

/* ── Page-Switch ── */
.page { display: none; }
.page.active { display: block; }

/* ── Detail view ── */
.back-btn {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border2);
  padding: 8px 16px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  cursor: pointer;
  border-radius: 3px;
  margin-bottom: 1.5rem;
  transition: all 0.15s;
}
.back-btn:hover { color: var(--text); border-color: var(--text); }
.back-btn::before { content: "← "; }

.detail-hero {
  background: linear-gradient(180deg, var(--s2) 0%, var(--s1) 100%);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 2rem 1.5rem;
  margin-bottom: 1.5rem;
  position: relative;
  overflow: hidden;
}
.detail-hero::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--red);
}
.detail-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.78rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 700;
  margin-bottom: 1.5rem;
  gap: 8px;
}
.detail-meta .status-tag {
  background: var(--green); color: white;
  padding: 3px 10px; border-radius: 2px; font-size: 0.7rem;
}
.detail-meta .status-tag.live { background: var(--yellow); color: #1a1a1a; }
.detail-meta .status-tag.upcoming { background: var(--s3); color: var(--muted); }

.detail-score-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 1.5rem;
}
.detail-team {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  text-align: center;
}
.detail-team img, .detail-team .logo-fallback {
  width: 80px; height: 80px;
  object-fit: contain;
}
.detail-team .logo-fallback {
  background: var(--s3);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800; font-size: 1.5rem;
}
.detail-team-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.3rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.detail-score {
  font-family: 'Barlow', sans-serif;
  font-size: 4.5rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  line-height: 1;
  white-space: nowrap;
  color: #ffffff;
}
.detail-score.upcoming {
  font-size: 2rem;
  color: var(--muted);
  font-weight: 500;
}
.detail-halftime {
  text-align: center;
  margin-top: 1rem;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.85rem; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
  margin-bottom: 1.5rem;
}
.stat-card {
  background: var(--s1);
  border: 1px solid var(--border);
  padding: 16px 18px;
  border-radius: 4px;
}
.stat-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.12em;
  font-weight: 600; margin-bottom: 6px;
}
.stat-value {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.4rem; font-weight: 700; letter-spacing: 0.02em;
}

.goals-block { margin-top: 0.5rem; }
.goals-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800; font-size: 1.2rem;
  text-transform: uppercase; letter-spacing: 0.05em;
  margin-bottom: 0.8rem;
  border-bottom: 2px solid var(--red);
  padding-bottom: 6px; display: inline-block;
}
.goal-list {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.goal-row {
  display: grid;
  grid-template-columns: 60px 1fr auto;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.goal-row:last-child { border-bottom: none; }
.goal-min {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800; font-size: 1rem;
  color: var(--red); letter-spacing: 0.04em;
}
.goal-info { display: flex; flex-direction: column; gap: 2px; }
.goal-scorer { font-weight: 600; font-size: 0.95rem; }
.goal-tags {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.7rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.1em;
}
.goal-tags .tag {
  background: var(--s3); padding: 1px 6px;
  border-radius: 2px; margin-right: 4px; display: inline-block;
}
.goal-tags .tag.pen { background: var(--yellow); color: #1a1a1a; }
.goal-tags .tag.own { background: var(--red); color: white; }
.goal-score-now {
  font-family: 'Barlow', sans-serif;
  font-weight: 600;
  font-size: 1rem;
  background: var(--s3);
  color: #ffffff;
  padding: 4px 12px;
  border-radius: 3px;
  letter-spacing: 0.04em;
}
.no-goals {
  padding: 1.5rem; text-align: center;
  color: var(--muted); font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.05em;
}

/* ── Tabelle (Standings) ── */
.table-wrap {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}
table.standings {
  width: 100%;
  border-collapse: collapse;
  font-family: 'Barlow', sans-serif;
}
table.standings thead {
  background: var(--s2);
  border-bottom: 1px solid var(--border2);
}
table.standings th {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  font-weight: 700;
  padding: 12px 6px;
  text-align: center;
}
table.standings th.left { text-align: left; padding-left: 14px; }
table.standings td {
  padding: 10px 6px;
  border-bottom: 1px solid var(--border);
  font-size: 0.9rem;
  text-align: center;
  vertical-align: middle;
}
table.standings tr:last-child td { border-bottom: none; }
table.standings td.team-cell {
  text-align: left;
  padding-left: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
table.standings td.pos {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 1rem;
  position: relative;
}
table.standings td.pos::before {
  content: "";
  position: absolute;
  left: 0; top: 6px; bottom: 6px;
  width: 3px;
  background: transparent;
}
table.standings tr.cl td.pos::before { background: var(--cl); }
table.standings tr.el td.pos::before { background: var(--el); }
table.standings tr.rel td.pos::before { background: var(--rel); }
table.standings td.pts {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 1.1rem;
  background: var(--s2);
}
table.standings .t-logo {
  width: 24px; height: 24px; object-fit: contain;
}
table.standings .t-logo-fb {
  width: 24px; height: 24px; background: var(--s3);
  border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
  font-size: 0.6rem; font-weight: 700;
}
table.standings tr.team-row:hover { background: var(--s2); }

.legend {
  display: flex; flex-wrap: wrap; gap: 14px;
  margin-top: 14px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem; color: var(--muted);
  letter-spacing: 0.06em; text-transform: uppercase;
}
.legend span { display: inline-flex; align-items: center; gap: 6px; }
.legend .dot {
  width: 10px; height: 10px; border-radius: 2px; display: inline-block;
}

/* ── Responsive ── */
@media (max-width: 600px) {
  header { padding: 0.9rem 1rem; }
  .logo { font-size: 1.3rem; }
  .logo-mark { width: 32px; height: 32px; }
  .tabs { top: 60px; }
  .tab-btn { padding: 12px 18px; font-size: 0.9rem; }
  main { padding: 1rem 0.7rem 2rem; }
  .match { grid-template-columns: 50px 1fr auto 1fr; padding: 10px 10px; gap: 6px; }
  .team-name { font-size: 0.78rem; }
  .team-logo, .team-logo-fallback { width: 22px; height: 22px; }
  .score { font-size: 1rem; padding: 5px 10px; min-width: 64px; letter-spacing: 0.08em; }
  .date-block { font-size: 0.7rem; }
  .detail-score { font-size: 2.8rem; padding: 0.4rem 1rem; }
  .detail-team img, .detail-team .logo-fallback { width: 56px; height: 56px; }
  .detail-team-name { font-size: 0.95rem; }
  .detail-score-row { gap: 0.5rem; }
  .goal-row { grid-template-columns: 44px 1fr auto; padding: 10px 12px; }
  table.standings th, table.standings td { padding: 8px 3px; font-size: 0.8rem; }
  table.standings th.left, table.standings td.team-cell { padding-left: 8px; }
  table.standings .t-logo, table.standings .t-logo-fb { width: 18px; height: 18px; }
  table.standings .hide-mobile { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="logo" id="homeBtn"><svg class="logo-mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="XB Bundesliga Logo"><circle cx="50" cy="50" r="46" fill="#0066cc"/><text x="50" y="70" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif" font-weight="900" font-size="58" fill="#000000" letter-spacing="-3" font-style="italic">XB</text></svg>BUNDES<span>LIGA</span></div>
  <div class="season-sel">
    <label for="seasonSel">Saison</label>
    <select id="seasonSel">
      <option value="2025">2025/26</option>
      <option value="2024">2024/25</option>
      <option value="2023">2023/24</option>
      <option value="2022">2022/23</option>
    </select>
  </div>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="spieltage">Spieltage</button>
  <button class="tab-btn" data-tab="tabelle">Tabelle</button>
</nav>

<main>
  <!-- SPIELTAGE PAGE -->
  <div id="page-spieltage" class="page active">
    <div id="listView">
      <div class="matchdays" id="matchdays"></div>
      <div class="section-title">
        Spieltag <span id="mdLabel">1</span>
        <span class="sub" id="mdDateRange"></span>
      </div>
      <div id="matches"><div class="loading">Lade Spieltag …</div></div>
    </div>

    <div id="detailView" style="display:none">
      <button class="back-btn" id="backBtn">Zurück zum Spieltag</button>
      <div id="detailContent"></div>
    </div>
  </div>

  <!-- TABELLE PAGE -->
  <div id="page-tabelle" class="page">
    <div class="section-title">
      Tabelle
      <span class="sub" id="tableSeasonLabel"></span>
    </div>
    <div id="tableContent"><div class="loading">Lade Tabelle …</div></div>
    <div class="legend">
      <span><span class="dot" style="background:var(--cl)"></span>Champions League</span>
      <span><span class="dot" style="background:var(--el)"></span>Europa / Conference</span>
      <span><span class="dot" style="background:var(--rel)"></span>Abstieg / Relegation</span>
    </div>
  </div>
</main>

<script>
const API = 'https://api.openligadb.de';
const LEAGUE = 'bl1';
let currentSeason = '2025';
let currentMatchday = 1;
let currentMatches = [];
let tableLoadedSeason = null;

const seasonSel = document.getElementById('seasonSel');
const mdEl = document.getElementById('matchdays');
const matchesEl = document.getElementById('matches');
const mdLabel = document.getElementById('mdLabel');
const mdDateRange = document.getElementById('mdDateRange');
const listView = document.getElementById('listView');
const detailView = document.getElementById('detailView');
const detailContent = document.getElementById('detailContent');
const tableContent = document.getElementById('tableContent');
const tableSeasonLabel = document.getElementById('tableSeasonLabel');

function seasonLabel(s) {
  const y = parseInt(s);
  return `${y}/${(y+1).toString().slice(-2)}`;
}

/* ── TABS ── */
document.querySelectorAll('.tab-btn').forEach(b => {
  b.addEventListener('click', () => switchTab(b.dataset.tab));
});

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === name);
  });
  document.querySelectorAll('.page').forEach(p => {
    p.classList.toggle('active', p.id === `page-${name}`);
  });
  if (name === 'tabelle' && tableLoadedSeason !== currentSeason) {
    loadTable();
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── SPIELTAGE ── */
function buildMatchdayButtons() {
  mdEl.innerHTML = '';
  for (let i = 1; i <= 34; i++) {
    const b = document.createElement('button');
    b.className = 'md-btn';
    b.textContent = i;
    b.dataset.md = i;
    b.addEventListener('click', () => loadMatchday(i));
    mdEl.appendChild(b);
  }
}

function setActiveButton(md) {
  document.querySelectorAll('.md-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.md) === md);
  });
}

async function getCurrentMatchday() {
  try {
    const r = await fetch(`${API}/getcurrentgroup/${LEAGUE}`);
    const g = await r.json();
    return g.groupOrderID || 1;
  } catch { return 1; }
}

function teamLogo(team, big = false) {
  if (team.teamIconUrl) {
    return `<img src="${team.teamIconUrl}" alt="${team.teamName}" class="${big ? '' : 'team-logo'}" onerror="this.style.display='none'">`;
  }
  const initials = team.shortName ? team.shortName.slice(0, 3).toUpperCase() : team.teamName.slice(0, 3).toUpperCase();
  return `<div class="${big ? 'logo-fallback' : 'team-logo-fallback'}">${initials}</div>`;
}

function fmtDateTime(iso) {
  const d = new Date(iso);
  const day = d.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit' });
  const time = d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  return { day, time, raw: d };
}

function getResults(match) {
  const results = match.matchResults || [];
  const endResult = results.find(r => r.resultName === 'Endergebnis') || results.find(r => r.resultTypeID === 2);
  const halftime = results.find(r => r.resultName === 'Halbzeitergebnis') || results.find(r => r.resultTypeID === 1);
  return { endResult, halftime };
}

async function loadMatchday(md) {
  currentMatchday = md;
  setActiveButton(md);
  mdLabel.textContent = md;
  mdDateRange.textContent = '';
  matchesEl.innerHTML = '<div class="loading">Lade Spieltag …</div>';
  showListView();

  try {
    const r = await fetch(`${API}/getmatchdata/${LEAGUE}/${currentSeason}/${md}`);
    if (!r.ok) throw new Error('API-Fehler');
    const matches = await r.json();
    currentMatches = matches;
    renderMatches(matches);
  } catch (e) {
    matchesEl.innerHTML = `<div class="error">Fehler beim Laden. Internet?</div>`;
  }
}

function renderMatches(matches) {
  if (!matches.length) {
    matchesEl.innerHTML = '<div class="loading">Keine Spiele gefunden.</div>';
    return;
  }

  const dates = matches.map(m => new Date(m.matchDateTime)).sort((a, b) => a - b);
  const first = dates[0], last = dates[dates.length - 1];
  const fmt = d => d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: '2-digit' });
  mdDateRange.textContent = first.toDateString() === last.toDateString()
    ? fmt(first) : `${fmt(first)} – ${fmt(last)}`;

  const html = matches.map((m, idx) => {
    const { day, time } = fmtDateTime(m.matchDateTime);
    const home = m.team1, away = m.team2;
    const finished = m.matchIsFinished;
    const { endResult } = getResults(m);

    let scoreHtml;
    if (finished && endResult) {
      scoreHtml = `<div class="score">${endResult.pointsTeam1} : ${endResult.pointsTeam2}<span class="fin-tag">FT</span></div>`;
    } else if (endResult && (endResult.pointsTeam1 > 0 || endResult.pointsTeam2 > 0)) {
      scoreHtml = `<div class="score">${endResult.pointsTeam1} : ${endResult.pointsTeam2}<span class="live-tag">LIVE</span></div>`;
    } else {
      scoreHtml = `<div class="score upcoming">${time}</div>`;
    }

    return `<div class="match ${!finished && endResult ? 'live' : ''}" data-idx="${idx}">
      <div class="date-block">${day}<br><span class="time">${time}</span></div>
      <div class="team home">
        <span class="team-name">${home.teamName}</span>
        ${teamLogo(home)}
      </div>
      ${scoreHtml}
      <div class="team away">
        ${teamLogo(away)}
        <span class="team-name">${away.teamName}</span>
      </div>
    </div>`;
  }).join('');

  matchesEl.innerHTML = `<div class="match-list">${html}</div>`;

  matchesEl.querySelectorAll('.match').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      showMatchDetail(currentMatches[idx]);
    });
  });
}

function showListView() {
  listView.style.display = 'block';
  detailView.style.display = 'none';
}
function showDetailViewBlock() {
  listView.style.display = 'none';
  detailView.style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showMatchDetail(m) {
  const home = m.team1, away = m.team2;
  const finished = m.matchIsFinished;
  const { endResult, halftime } = getResults(m);
  const { time, raw } = fmtDateTime(m.matchDateTime);
  const fullDate = raw.toLocaleDateString('de-DE', {
    weekday: 'long', day: '2-digit', month: 'long', year: 'numeric'
  });

  let statusTag;
  if (finished) statusTag = `<span class="status-tag">Beendet</span>`;
  else if (endResult && (endResult.pointsTeam1 > 0 || endResult.pointsTeam2 > 0))
    statusTag = `<span class="status-tag live">Live</span>`;
  else statusTag = `<span class="status-tag upcoming">Anstehend</span>`;

  let scoreBlock;
  if (endResult && (finished || endResult.pointsTeam1 > 0 || endResult.pointsTeam2 > 0)) {
    scoreBlock = `<div class="detail-score">${endResult.pointsTeam1} : ${endResult.pointsTeam2}</div>`;
  } else {
    scoreBlock = `<div class="detail-score upcoming">${time}</div>`;
  }

  const halftimeHtml = halftime
    ? `<div class="detail-halftime">Halbzeit · ${halftime.pointsTeam1} : ${halftime.pointsTeam2}</div>`
    : '';

  const stadium = m.location
    ? `${m.location.locationStadium}${m.location.locationCity ? ', ' + m.location.locationCity : ''}`
    : '—';
  const viewers = m.numberOfViewers ? m.numberOfViewers.toLocaleString('de-DE') : '—';
  const goalsTotal = (m.goals || []).length;

  const statsHtml = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Anstoß</div>
        <div class="stat-value">${fullDate}</div>
        <div class="stat-label" style="margin-top:8px">${time} Uhr</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Stadion</div>
        <div class="stat-value">${stadium}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Zuschauer</div>
        <div class="stat-value">${viewers}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tore gesamt</div>
        <div class="stat-value">${goalsTotal}</div>
      </div>
    </div>
  `;

  const goals = (m.goals || []).slice().sort((a, b) => (a.matchMinute || 0) - (b.matchMinute || 0));
  let goalsHtml;
  if (!goals.length) {
    goalsHtml = `<div class="goal-list"><div class="no-goals">${finished ? 'Keine Tore in diesem Spiel.' : 'Noch keine Tore.'}</div></div>`;
  } else {
    goalsHtml = `<div class="goal-list">` + goals.map(g => {
      const tags = [];
      if (g.isPenalty) tags.push(`<span class="tag pen">Elfmeter</span>`);
      if (g.isOwnGoal) tags.push(`<span class="tag own">Eigentor</span>`);
      if (g.isOverTime) tags.push(`<span class="tag">Nachspielzeit</span>`);
      return `<div class="goal-row">
        <div class="goal-min">${g.matchMinute || '?'}'</div>
        <div class="goal-info">
          <div class="goal-scorer">${g.goalGetterName || 'Unbekannt'}</div>
          ${tags.length ? `<div class="goal-tags">${tags.join('')}</div>` : ''}
        </div>
        <div class="goal-score-now">${g.scoreTeam1} : ${g.scoreTeam2}</div>
      </div>`;
    }).join('') + `</div>`;
  }

  detailContent.innerHTML = `
    <div class="detail-hero">
      <div class="detail-meta">
        <span>Spieltag ${currentMatchday} · ${seasonLabel(currentSeason)}</span>
        ${statusTag}
      </div>
      <div class="detail-score-row">
        <div class="detail-team">
          ${teamLogo(home, true)}
          <div class="detail-team-name">${home.teamName}</div>
        </div>
        ${scoreBlock}
        <div class="detail-team">
          ${teamLogo(away, true)}
          <div class="detail-team-name">${away.teamName}</div>
        </div>
      </div>
      ${halftimeHtml}
    </div>

    ${statsHtml}

    <div class="goals-block">
      <div class="goals-title">Torschützen</div>
      ${goalsHtml}
    </div>
  `;

  showDetailViewBlock();
}

/* ── TABELLE ── */
async function loadTable() {
  tableSeasonLabel.textContent = seasonLabel(currentSeason);
  tableContent.innerHTML = '<div class="loading">Lade Tabelle …</div>';
  try {
    const r = await fetch(`${API}/getbltable/${LEAGUE}/${currentSeason}`);
    if (!r.ok) throw new Error('API-Fehler');
    const data = await r.json();
    renderTable(data);
    tableLoadedSeason = currentSeason;
  } catch (e) {
    tableContent.innerHTML = `<div class="error">Tabelle konnte nicht geladen werden.</div>`;
  }
}

function renderTable(teams) {
  if (!teams || !teams.length) {
    tableContent.innerHTML = '<div class="loading">Keine Tabellendaten verfügbar.</div>';
    return;
  }

  // Sort: by points desc, then goal diff desc, then goals desc
  teams.sort((a, b) => {
    const pa = a.points ?? 0, pb = b.points ?? 0;
    if (pb !== pa) return pb - pa;
    const gda = (a.goals ?? 0) - (a.opponentGoals ?? 0);
    const gdb = (b.goals ?? 0) - (b.opponentGoals ?? 0);
    if (gdb !== gda) return gdb - gda;
    return (b.goals ?? 0) - (a.goals ?? 0);
  });

  const rows = teams.map((t, i) => {
    const pos = i + 1;
    const gd = (t.goals ?? 0) - (t.opponentGoals ?? 0);
    const gdStr = gd > 0 ? `+${gd}` : `${gd}`;
    let cls = '';
    if (pos <= 4) cls = 'cl';
    else if (pos === 5 || pos === 6) cls = 'el';
    else if (pos === 16) cls = 'rel';
    else if (pos >= 17) cls = 'rel';

    const logo = t.teamIconUrl
      ? `<img src="${t.teamIconUrl}" alt="${t.teamName}" class="t-logo" onerror="this.style.display='none'">`
      : `<div class="t-logo-fb">${(t.shortName || t.teamName).slice(0,3).toUpperCase()}</div>`;

    const shortOrLong = t.shortName && t.shortName.length <= 14 ? t.shortName : t.teamName;

    return `<tr class="team-row ${cls}">
      <td class="pos">${pos}</td>
      <td class="team-cell">
        ${logo}
        <span>${shortOrLong}</span>
      </td>
      <td>${t.matches ?? 0}</td>
      <td class="hide-mobile">${t.won ?? 0}</td>
      <td class="hide-mobile">${t.draw ?? 0}</td>
      <td class="hide-mobile">${t.lost ?? 0}</td>
      <td class="hide-mobile">${t.goals ?? 0}:${t.opponentGoals ?? 0}</td>
      <td>${gdStr}</td>
      <td class="pts">${t.points ?? 0}</td>
    </tr>`;
  }).join('');

  tableContent.innerHTML = `
    <div class="table-wrap">
      <table class="standings">
        <thead>
          <tr>
            <th>#</th>
            <th class="left">Verein</th>
            <th>Sp</th>
            <th class="hide-mobile">S</th>
            <th class="hide-mobile">U</th>
            <th class="hide-mobile">N</th>
            <th class="hide-mobile">Tore</th>
            <th>Diff</th>
            <th>Pkt</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

/* ── Init ── */
document.getElementById('backBtn').addEventListener('click', showListView);
document.getElementById('homeBtn').addEventListener('click', () => {
  showListView();
  switchTab('spieltage');
});
seasonSel.addEventListener('change', e => {
  currentSeason = e.target.value;
  tableLoadedSeason = null;
  loadMatchday(1);
  // if user is on Tabelle, reload immediately
  if (document.getElementById('page-tabelle').classList.contains('active')) {
    loadTable();
  }
});

async function init() {
  buildMatchdayButtons();
  const md = await getCurrentMatchday();
  loadMatchday(md);
}
init();
